<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Teste</title>

    <style>
        

        body {
            display: flex;
            flex-direction: column;

            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #e5ddd5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .idSender{
            font-size: 10px;

            color: #3d3d3d;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: white;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .chat-header {
            display: flex;

            align-items: center;

            background: #075e54;
            color: white;
            padding: 15px;
            font-weight: bold;

            input {
                width: 90px;
                height: 20px;
                border: none;
                border-radius: 10px;
                margin-left: auto;

                padding-left: 10px;
            }

        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .sent {
            background: #dcf8c6;
            align-self: flex-end;
        }

        .received {
            background: #f1f0f0;
            align-self: flex-start;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            gap: 5px;
            background: #f0f0f0;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
        }

        .chat-input button {
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            background: #075e54;
            color: white;
            cursor: pointer;
        }

        .chat-input button:hover {
            background: #0b7a6c;
        }
    </style>
</head>

<body>
    <h1>Z@P <Strong>V0.1</Strong></h1>

    <div class="chat-container">
        <div class="chat-header">
            <p id="chatId"></p>

            <input required id="receivedId" type="text" placeholder="Id remetente">
        </div>

        <div class="chat-messages" id="chat"></div>

        <div class="chat-input">
            <input required type="text" id="mensagemEnviada" placeholder="Sua mensagem..."
                onkeypress="if(event.key === 'Enter') enviarMensagem()">
            <button onclick="enviarMensagem()">Enviar</button>
        </div>
    </div>

    <script>

        const randomId = Math.floor(Math.random() * 90000) + 10000
        document.getElementById("chatId").textContent = "ID " + randomId
        
        function enviarMensagem() {
            var input = document.getElementById("mensagemEnviada");
            sendMensage(input)
            adicionarMensagem(input.value, "sent");
            input.value = "";
            
        }

        function adicionarMensagem(texto, tipo, id) {
            if (texto.trim() !== "") {
                var chat = document.getElementById("chat");

                var novaMensagem = document.createElement("div");
                novaMensagem.classList.add("message", tipo);
                novaMensagem.textContent = texto;

                chat.appendChild(novaMensagem);
                chat.scrollTop = chat.scrollHeight;
            }
        }
        
        var receivedId = document.getElementById("receivedId");

        let socket = new WebSocket("ws://127.0.0.1:2000/connect");

        socket.onopen = () => {
            socket.send(JSON.stringify({
                "type": "createConnection",
                "sendId": randomId
            }));
        };

        function sendMensage(mensage){
            socket.send(JSON.stringify({
                "type": "sendMensage",
                "receivedId": receivedId.value,
                "mensage": mensage.value
            }))
        }

        socket.onmessage = function(mensage){
            jsonObj = JSON.parse(mensage.data)
            adicionarMensagem(jsonObj.mensage, "received")
        }


        //quero fazer fechar a conecção 
        // socket.onerror = function(error) {
        // alert(`[error]`);
        // };

    </script>

</body>

</html>
